services:

  mysql1:
    image: mysql:8.4
    container_name: mysql1
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: docker_test
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3310:3306"

  mysql2:
    image: mysql:8.4
    container_name: mysql2
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: docker_test
    volumes:
      - ./init2.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3311:3306"

  mysql3:
    image: mysql:8.4
    container_name: mysql3
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: docker_test
    volumes:
      - ./init3.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3312:3306"